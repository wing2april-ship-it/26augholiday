        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: #f5f1ea;
            color: #1e2b3a;
            line-height: 1.6;
            padding: 0 0 40px 0;
        }

        /* ===== 顶部 Hero ===== */
        .hero {
            background: linear-gradient(145deg, #142b44 0%, #1f4a6e 50%, #2a6a8a 100%);
            color: #fff;
            padding: 48px 24px 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }
        .hero::after {
            content: '';
            position: absolute;
            top: -60%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 168, 75, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero::before {
            content: '✦';
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 80px;
            opacity: 0.06;
            color: #d4a84b;
        }
        .hero h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }
        .hero h1 span {
            color: #d4a84b;
        }
        .hero .sub {
            font-size: 16px;
            opacity: 0.85;
            margin-top: 8px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }
        .hero .sub em {
            font-style: normal;
            background: rgba(212, 168, 75, 0.2);
            padding: 0 10px;
            border-radius: 12px;
        }
        .hero .date-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .hero .date-tabs button {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 22px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
            font-family: inherit;
            letter-spacing: 0.5px;
        }
        .hero .date-tabs button:hover {
            background: rgba(212, 168, 75, 0.3);
            border-color: #d4a84b;
            transform: translateY(-2px);
        }
        .hero .date-tabs button.active {
            background: #d4a84b;
            color: #142b44;
            border-color: #d4a84b;
            font-weight: 600;
        }

        /* ===== 主容器 ===== */
        .container {
            max-width: 820px;
            margin: 0 auto;
            padding: 0 18px;
        }

        /* ===== 每日 Section ===== */
        .day-section {
            margin-top: 32px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .day-section:hover {
            box-shadow: 0 8px 36px rgba(0, 0, 0, 0.10);
        }

        .day-header {
            padding: 20px 28px 16px;
            border-bottom: 2px solid #f0ebe2;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px 16px;
            background: #faf8f5;
        }
        .day-header .day-label {
            font-size: 20px;
            font-weight: 700;
            color: #1e2b3a;
        }
        .day-header .day-label small {
            font-weight: 400;
            font-size: 15px;
            color: #7a8896;
            margin-left: 6px;
        }
        .day-header .day-badge {
            background: #d4a84b;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 2px 14px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            margin-left: auto;
        }

        /* ===== 时间线 ===== */
        .timeline {
            padding: 12px 12px 16px 12px;
        }

        .timeline-item {
            display: flex;
            gap: 14px;
            padding: 12px 14px 12px 10px;
            border-radius: 16px;
            transition: background 0.2s;
            cursor: pointer;
            position: relative;
            border-left: 3px solid transparent;
        }
        .timeline-item:hover {
            background: #f8f5ef;
        }
        .timeline-item.active {
            background: #f8f5ef;
            border-left-color: #d4a84b;
        }

        /* 时间标签 */
        .timeline-item .time-tag {
            flex: 0 0 76px;
            font-size: 14px;
            font-weight: 600;
            color: #1e2b3a;
            padding-top: 2px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: flex-start;
            gap: 4px;
        }
        .timeline-item .time-tag .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d4a84b;
            flex-shrink: 0;
            margin-top: 6px;
            margin-right: 4px;
            box-shadow: 0 0 0 3px rgba(212, 168, 75, 0.2);
        }

        /* 内容区 */
        .timeline-item .content-wrap {
            flex: 1;
            min-width: 0;
        }
        .timeline-item .title {
            font-size: 17px;
            font-weight: 600;
            color: #142b44;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .timeline-item .title .icon {
            font-size: 18px;
        }
        .timeline-item .brief {
            font-size: 14px;
            color: #6b7a8a;
            margin-top: 2px;
            line-height: 1.5;
        }

        /* 详情 (默认收起) */
        .timeline-item .details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s ease, opacity 0.35s ease, margin 0.3s ease;
            opacity: 0;
            margin-top: 0;
        }
        .timeline-item .details.open {
            max-height: 600px;
            opacity: 1;
            margin-top: 12px;
        }

        .timeline-item .details-inner {
            background: #f5f1ea;
            border-radius: 14px;
            padding: 16px 20px;
            border-left: 3px solid #d4a84b;
            font-size: 14px;
            color: #2a3b4e;
            line-height: 1.7;
        }
        .timeline-item .details-inner .row {
            display: flex;
            gap: 6px;
            align-items: flex-start;
            margin-top: 4px;
        }
        .timeline-item .details-inner .row:first-child {
            margin-top: 0;
        }
        .timeline-item .details-inner .label {
            font-weight: 600;
            color: #1e2b3a;
            flex-shrink: 0;
            width: 52px;
        }
        .timeline-item .details-inner .value {
            color: #2a3b4e;
        }
        .timeline-item .details-inner .value a {
            color: #1f4a6e;
            text-decoration: none;
            border-bottom: 1px dotted rgba(31, 74, 110, 0.3);
        }
        .timeline-item .details-inner .value a:hover {
            border-bottom-color: #1f4a6e;
        }
        .timeline-item .details-inner .tip {
            background: #e8e1d6;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 8px;
            color: #1e2b3a;
            font-size: 13.5px;
        }
        .timeline-item .details-inner .tip strong {
            color: #142b44;
        }

        /* 展开/收起 指示器 */
        .timeline-item .toggle-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #7a8896;
            margin-top: 6px;
            font-weight: 500;
            transition: color 0.2s;
            user-select: none;
        }
        .timeline-item .toggle-indicator:hover {
            color: #142b44;
        }
        .timeline-item .toggle-indicator .arrow {
            display: inline-block;
            transition: transform 0.35s ease;
            font-size: 14px;
        }
        .timeline-item .toggle-indicator .arrow.open {
            transform: rotate(180deg);
        }

        /* ===== 特殊标注 ===== */
        .badge-warn {
            display: inline-block;
            background: #e85a4f;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            padding: 0 10px;
            border-radius: 12px;
            line-height: 22px;
            margin-left: 6px;
        }
        .badge-tip {
            display: inline-block;
            background: #d4a84b;
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            padding: 0 10px;
            border-radius: 12px;
            line-height: 20px;
            margin-left: 6px;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            margin-top: 44px;
            padding: 20px 16px 10px;
            color: #8a9aa8;
            font-size: 13px;
            border-top: 1px solid #e8e1d6;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
        }
        .footer span {
            color: #d4a84b;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 26px;
            }
            .hero .sub {
                font-size: 14px;
            }
            .hero .date-tabs button {
                padding: 6px 16px;
                font-size: 13px;
            }
            .day-header {
                padding: 16px 18px 12px;
            }
            .day-header .day-label {
                font-size: 18px;
            }
            .timeline {
                padding: 6px 4px 10px;
            }
            .timeline-item {
                flex-direction: column;
                gap: 4px;
                padding: 10px 12px;
                border-left: none;
                border-radius: 12px;
            }
            .timeline-item .time-tag {
                flex: none;
                font-size: 13px;
                padding-top: 0;
                align-items: center;
                gap: 6px;
                width: 100%;
            }
            .timeline-item .time-tag .dot {
                margin-top: 0;
                width: 8px;
                height: 8px;
            }
            .timeline-item .title {
                font-size: 16px;
            }
            .timeline-item .details-inner {
                padding: 14px 16px;
                font-size: 13.5px;
            }
            .timeline-item .details-inner .label {
                width: 44px;
                font-size: 13px;
            }
            .container {
                padding: 0 12px;
            }
            .day-section {
                border-radius: 18px;
            }
        }

        @media (max-width: 400px) {
            .hero h1 {
                font-size: 22px;
            }
            .timeline-item .title {
                font-size: 15px;
            }
            .timeline-item .brief {
                font-size: 13px;
            }
            .day-header .day-badge {
                font-size: 11px;
                padding: 0 10px;
                margin-left: 0;
                width: 100%;
                margin-top: 4px;
            }
        }

        /* ===== 工具类 ===== */
        .mt-1 {
            margin-top: 4px;
        }
        .text-gold {
            color: #d4a84b;
        }
        .fw-600 {
            font-weight: 600;
        }

        /* ===== 滚动条美化 ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f0ebe2;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c4b5a0;
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b0a08a;
        }
    </style>
</head>

                icon: '🚅',
                title: '晚餐 → 高铁回程',
                brief: '享用晚餐后前往高铁站，结束愉快旅程。',
                address: '尖沙咀附近餐厅 → 高铁西九龙站',
                hours: '——',
                tip: '晚餐看看想吃什么，可以试试泰国菜或是韩国菜，之后乘地铁或打车前往高铁西九龙站，预留充裕时间过关。'
            }]
        }];

        // ============================================================
        //  渲染
        // ============================================================
        const app = document.getElementById('app');

        function render() {
            let html = '';
            tripData.forEach((dayData, dayIdx) => {
                const itemsHtml = dayData.items.map((item, idx) => {
                    const itemId = `d${dayIdx}-i${idx}`;
                    // 处理 tip 中的换行
                    const tipLines = item.tip ? item.tip.split('\n').map(line => line.trim()).filter(Boolean) : [];
                    const tipHtml = tipLines.length ? tipLines.map(line =>
                        `<div>${line}</div>`
                    ).join('') : '';

                    return `
                        <div class="timeline-item" data-id="${itemId}" onclick="toggleDetail('${itemId}')">
                            <div class="time-tag">
                                <span class="dot"></span>
                                <span>${item.time}</span>
                            </div>
                            <div class="content-wrap">
                                <div class="title">
                                    <span class="icon">${item.icon}</span>
                                    ${item.title}
                                    ${item.title.includes('迪士尼') ? '<span class="badge-warn">⚠️ 禁带食物</span>' : ''}
                                    ${item.title.includes('球幕电影') ? '<span class="badge-tip">🎬 17:00场</span>' : ''}
                                    ${item.title.includes('山顶缆车') ? '<span class="badge-tip">🌃 必看</span>' : ''}
                                </div>
                                <div class="brief">${item.brief}</div>
                                <div class="details" id="details-${itemId}">
                                    <div class="details-inner">
                                        <div class="row">
                                            <span class="label">📍 地址</span>
                                            <span class="value">${item.address}</span>
                                        </div>
                                        <div class="row">
                                            <span class="label">🕐 时间</span>
                                            <span class="value">${item.hours}</span>
                                        </div>
                                        ${tipHtml ? `
                                        <div class="tip">
                                            <strong>💡 攻略</strong>
                                            ${tipHtml}
                                        </div>
                                        ` : ''}
                                    </div>
                                </div>
                                <div class="toggle-indicator" id="indicator-${itemId}">
                                    <span>查看详情</span>
                                    <span class="arrow">▾</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                html += `
                    <section class="day-section" id="day-${dayIdx}">
                        <div class="day-header">
                            <span class="day-label">
                                ${dayData.day} · ${dayData.date}
                                <small>${dayData.weekday}</small>
                            </span>
                            <span class="day-badge">${dayData.items.length} 个行程点</span>
                        </div>
                        <div class="timeline">
                            ${itemsHtml}
                        </div>
                    </section>
                `;
            });
            app.innerHTML = html;
        }

        // ============================================================
        //  交互：展开 / 收起
        // ============================================================
        let openItems = new Set();

        function toggleDetail(id) {
            const details = document.getElementById(`details-${id}`);
            const indicator = document.getElementById(`indicator-${id}`);
            if (!details || !indicator) return;

            const isOpen = openItems.has(id);
            if (isOpen) {
                openItems.delete(id);
                details.classList.remove('open');
                indicator.querySelector('.arrow').classList.remove('open');
                indicator.querySelector('span:first-child').textContent = '查看详情';
            } else {
                openItems.add(id);
                details.classList.add('open');
                indicator.querySelector('.arrow').classList.add('open');
                indicator.querySelector('span:first-child').textContent = '收起详情';
            }
        }

        // ============================================================
        //  导航 Tabs 滚动
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            render();

            // 导航按钮
            const tabs = document.querySelectorAll('.date-tabs button');
            tabs.forEach((btn, idx) => {
                btn.addEventListener('click', function() {
                    tabs.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const target = document.getElementById(`day-${idx}`);
                    if (target) {
                        const topOffset = target.getBoundingClientRect().top + window.pageYOffset - 70;
                        window.scrollTo({ top: topOffset, behavior: 'smooth' });
                    }
                });
            });

            // 默认打开第一个行程点（第一天第一个）
            setTimeout(() => {
                const firstItem = document.querySelector('.timeline-item');
                if (firstItem) {
                    const id = firstItem.dataset.id;
                    if (id) toggleDetail(id);
                }
            }, 300);
        });

        // 暴露 toggleDetail 给全局
        window.toggleDetail = toggleDetail;
    </script>

</body>
</html>
